  <text x="32" y="135" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#9aa0b3">Scrolling</text>
  <text x="32" y="165" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#9aa0b3">Per-app rules</text>
  <text x="32" y="195" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#9aa0b3">Hotkeys</text>
  <text x="32" y="225" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#9aa0b3">Appearance</text>
  <text x="32" y="255" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#9aa0b3">About</text>
  <text x="210" y="100" font-family="-apple-system, Segoe UI, sans-serif" font-size="22" fill="#f5f6fa" font-weight="700">General</text>
  <rect x="210" y="130" width="560" height="68" rx="12" fill="#14151c"/>
  <text x="230" y="158" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" fill="#f5f6fa" font-weight="600">Launch at startup</text>
  <text x="230" y="180" font-family="-apple-system, Segoe UI, sans-serif" font-size="12" fill="#9aa0b3">Run SmoothScroll automatically when you sign in.</text>
