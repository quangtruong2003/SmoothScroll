  <text x="230" y="340" font-family="-apple-system, Segoe UI, sans-serif" font-size="12" fill="#9aa0b3">120 Hz on supported displays.</text>
  <rect x="690" y="306" width="64" height="32" rx="8" fill="#232531"/>
  <text x="722" y="326" font-family="-apple-system, Segoe UI, sans-serif" font-size="12" fill="#f5f6fa" text-anchor="middle">120 Hz</text>
