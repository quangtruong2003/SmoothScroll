name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            artifact-name: SmoothScroll_${{ github.ref_name }}_aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            artifact-name: SmoothScroll_${{ github.ref_name }}_x64
          - platform: windows-latest
            args: ''
            target: ''
            artifact-name: SmoothScroll_${{ github.ref_name }}_x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          toolchain: stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install create-dmg

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target != '' && format('{0}/release/', matrix.target) || 'release/' }}bundle/**/*.exe
            src-tauri/target/${{ matrix.target != '' && format('{0}/release/', matrix.target) || 'release/' }}bundle/**/*.msi
            src-tauri/target/${{ matrix.target != '' && format('{0}/release/', matrix.target) || 'release/' }}bundle/**/*.app
            src-tauri/target/${{ matrix.target != '' && format('{0}/release/', matrix.target) || 'release/' }}bundle/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
