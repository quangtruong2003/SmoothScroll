name: Deploy Landing Page

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  release:
    types: [published]
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js static export
        run: pnpm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /SmoothScroll

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup-deployments:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      actions: write
    steps:
      - name: Delete old GitHub Pages deployments (keep latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # List deployments in github-pages env (newest first), skip the first (latest), delete the rest
          gh api "repos/${GH_REPO}/deployments?environment=github-pages&per_page=100" \
            --jq '.[].id' \
            | tail -n +2 \
            | while read -r id; do
                if [ -n "$id" ]; then
                  echo "Marking deployment $id inactive"
                  gh api -X POST "repos/${GH_REPO}/deployments/${id}/statuses" \
                    -f state=inactive -f description="Superseded by newer deployment" \
                    >/dev/null 2>&1 || true
                  echo "Deleting deployment $id"
                  gh api -X DELETE "repos/${GH_REPO}/deployments/${id}" \
                    >/dev/null 2>&1 || echo "  failed to delete $id"
                fi
              done

      - name: Delete old workflow runs (keep latest 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api "repos/${GH_REPO}/actions/workflows/deploy-landing.yml/runs?per_page=100" \
            --jq '.workflow_runs[].id' \
            | tail -n +6 \
            | while read -r run_id; do
                if [ -n "$run_id" ]; then
                  echo "Deleting workflow run $run_id"
                  gh api -X DELETE "repos/${GH_REPO}/actions/runs/${run_id}" \
                    >/dev/null 2>&1 || echo "  failed to delete $run_id"
                fi
              done
