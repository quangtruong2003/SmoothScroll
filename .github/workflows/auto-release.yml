name: Auto Release

on:
  push:
    branches: [master]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'Cargo.toml'
      - '.github/workflows/auto-release.yml'
      - 'macos/**'
  workflow_dispatch:

# Cancel in-progress runs for master
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Guard: if this push was triggered by the bump commit itself (tag push or
  # [skip release] commit), the re-triggered workflow must not run bump again —
  # doing so would skip all downstream build jobs silently.
  # The re-triggered run exits here; the original run's build jobs continue.
  _guard:
    if: |
      !(
        github.event_name == 'push' &&
        (
          startsWith(github.ref, 'refs/tags/v') ||
          contains(github.event.head_commit.message, '[skip release]')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "Guarded: not a re-triggered run"'

  # Run tests first — if any test fails, stop the entire workflow (no build)
  test:
    needs: [_guard, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libx11-dev libxi-dev libxtst-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: ci-wasm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-engine-release
          path: src/lib/engine-wasm/

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run TypeScript/Vitest tests
        run: pnpm test

      - name: Run script tests
        run: node --test scripts/*.test.mjs

  bump:
    needs: [_guard, test, build-wasm]
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      is_prerelease: ${{ steps.bump.outputs.is_prerelease }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version via Conventional Commits
        id: bump
        run: |
          set +e
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          HEAD_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last tag: $LAST_TAG"

          LAST_TAG="$LAST_TAG" HEAD_COMMIT_MSG="$HEAD_COMMIT_MSG" node scripts/version-bump.mjs
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 78 ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "No release triggered. Skipping downstream jobs."
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "version-bump.mjs failed with exit $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        if: steps.bump.outputs.skipped != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh Cargo.lock
        if: steps.bump.outputs.skipped != 'true'
        run: cargo update --workspace --offline || cargo update --workspace

      - name: Commit + tag + push
        if: steps.bump.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml src-tauri/Cargo.toml package.json src-tauri/tauri.conf.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }} [skip release]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.version }}"

  # Build WASM once and share as artifact
  build-wasm:
    needs: [_guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: ci-wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build WASM engine
        run: pnpm run build:wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-engine-release
          path: src/lib/engine-wasm/
          retention-days: 1

  build-windows:
    needs: [bump, build-wasm, test]
    if: needs.bump.outputs.skipped != 'true'
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: build-windows

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-engine-release
          path: src/lib/engine-wasm/

      - name: Build Tauri app (release-fast - no LTO, parallel codegen)
        env:
          TAURI_BUILD_PROFILE: release-fast
        run: pnpm tauri build

      - name: Generate latest.json (stable channel)
        shell: bash
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          TAG="${{ needs.bump.outputs.tag }}"
          EXE_NAME="SmoothScroll_${VERSION}_x64-setup.exe"
          EXE_PATH="target/release-fast/bundle/nsis/$EXE_NAME"

          if [ ! -f "$EXE_PATH.sig" ]; then
            echo ".sig file not found at $EXE_PATH.sig"
            exit 1
          fi

          node scripts/generate-updater-manifest.mjs \
            --channel stable \
            --version "$VERSION" \
            --tag "$TAG" \
            --output release-feed/latest.json \
            --windows-exe "$EXE_PATH"

      - name: Upload installers + feed to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: |
            target/release-fast/bundle/nsis/*.exe
            target/release-fast/bundle/nsis/*.sig
            target/release-fast/bundle/msi/*.msi
            release-feed/latest.json

  build-macos:
    needs: [bump, test]
    if: needs.bump.outputs.skipped != 'true'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          shared-key: build-macos-${{ matrix.target }}

      - name: Build Rust engine
        run: |
          cargo build --profile release-fast -p smoothscroll_platform -p smoothscroll_core --target ${{ matrix.target }}

      - name: Build Swift app
        run: |
          # Download xcodegen binary directly from GitHub releases
          # xcodegen.zip extracts to ./xcodegen/ in the repo root
          curl -fsSL https://github.com/yonaskolb/XcodeGen/releases/download/2.45.0/xcodegen.zip -o xcodegen.zip && \
          unzip -o xcodegen.zip && \
          chmod +x xcodegen/bin/xcodegen && \
          cd macos/SmoothScrollMenuBar && \
          ../../xcodegen/bin/xcodegen generate && \
          xcodebuild -project SmoothScrollMenuBar.xcodeproj -scheme SmoothScrollMenuBar -configuration Release -arch ${{ matrix.arch == 'x64' && 'x86_64' || matrix.arch }} CONFIGURATION_BUILD_DIR=build/Release build

      - name: Package DMG
        id: package-dmg
        run: |
          mkdir -p dmg-tmp
          APP_PATH="macos/SmoothScrollMenuBar/build/Release/SmoothScrollMenuBar.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App not found at $APP_PATH"
            echo "Contents of build/:"
            ls -la macos/SmoothScrollMenuBar/build/ 2>/dev/null || echo "build dir does not exist"
            exit 1
          fi
          hdiutil create dmg-tmp/SmoothScroll.dmg -volname SmoothScroll -srcfolder "$APP_PATH" -ov
          DMG_PATH="dmg-tmp/SmoothScroll_${{ matrix.arch }}.dmg"
          mv dmg-tmp/SmoothScroll.dmg "$DMG_PATH"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          # NOTE: Do NOT set generate_release_notes here — parallel macOS builds
          # would recreate release notes and lose each other's DMGs. Release notes
          # are generated by the Windows build only.
          files: |
            dmg-tmp/*.dmg

  build-linux:
    needs: [bump, build-wasm, test]
    if: needs.bump.outputs.skipped != 'true'
    runs-on: ubuntu-22.04
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: build-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libx11-dev libxi-dev libxtst-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-engine-release
          path: src/lib/engine-wasm/

      - name: Build Tauri app (release-fast - no LTO, parallel codegen)
        env:
          TAURI_BUILD_PROFILE: release-fast
        run: pnpm tauri build

      - name: Upload .deb and .AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          files: |
            target/release-fast/bundle/deb/*.deb
            target/release-fast/bundle/appimage/*.AppImage

  cleanup-releases:
    needs: [bump, build-wasm, build-windows, build-linux, test]
    if: always() && needs.bump.outputs.skipped != 'true' && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete old releases and tags (keep latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          CURRENT_TAG="${{ needs.bump.outputs.tag }}"
          echo "Keeping release: $CURRENT_TAG"
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | grep -vx "$CURRENT_TAG" \
            | while read -r tag; do
                if [ -n "$tag" ]; then
                  echo "Deleting release + tag: $tag"
                  gh release delete "$tag" --cleanup-tag --yes || echo "  failed to delete $tag"
                fi
              done
