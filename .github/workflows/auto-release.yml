name: Auto Release

on:
  push:
    branches: [master]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'Cargo.toml'
      - '.github/workflows/auto-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      is_prerelease: ${{ steps.bump.outputs.is_prerelease }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version via Conventional Commits
        id: bump
        run: |
          set +e
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          HEAD_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last tag: $LAST_TAG"

          LAST_TAG="$LAST_TAG" HEAD_COMMIT_MSG="$HEAD_COMMIT_MSG" node scripts/version-bump.mjs
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 78 ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "No release triggered. Skipping downstream jobs."
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "version-bump.mjs failed with exit $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        if: steps.bump.outputs.skipped != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh Cargo.lock
        if: steps.bump.outputs.skipped != 'true'
        run: cargo update --workspace --offline || cargo update --workspace

      - name: Commit + tag + push
        if: steps.bump.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml src-tauri/Cargo.toml package.json src-tauri/tauri.conf.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }} [skip release]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.version }}"

  build-windows:
    needs: bump
    if: needs.bump.outputs.skipped != 'true'
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: build-windows

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build WASM engine bundle
        run: pnpm run build:wasm

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Generate latest.json (stable channel)
        shell: bash
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          TAG="${{ needs.bump.outputs.tag }}"
          EXE_NAME="SmoothScroll_${VERSION}_x64-setup.exe"
          EXE_PATH="target/release/bundle/nsis/$EXE_NAME"

          if [ ! -f "$EXE_PATH.sig" ]; then
            echo ".sig file not found at $EXE_PATH.sig"
            exit 1
          fi

          node scripts/generate-updater-manifest.mjs \
            --channel stable \
            --version "$VERSION" \
            --tag "$TAG" \
            --output release-feed/latest.json \
            --windows-exe "$EXE_PATH"

      - name: Upload installers + feed to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
            target/release/bundle/msi/*.msi
            release-feed/latest.json

