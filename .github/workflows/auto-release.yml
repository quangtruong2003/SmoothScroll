name: Auto Release

on:
  push:
    branches: [master]
    paths:
      - 'crates/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'Cargo.toml'
      - '.github/workflows/auto-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-edit-${{ runner.os }}

      - name: Install cargo-edit
        run: |
          if ! command -v cargo-set-version &> /dev/null; then
            cargo install cargo-edit --locked
          fi

      - name: Bump workspace version
        id: bump
        run: |
          cargo set-version --bump patch \
            -p smoothscroll_core \
            -p smoothscroll_platform \
            -p smoothscroll-app
          NEW_VERSION=$(grep -m1 '^version =' Cargo.toml | sed -E 's/.*"(.*)"/\1/')
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Sync package.json
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Sync tauri.conf.json
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Commit + tag + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml src-tauri/Cargo.toml package.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.version }}"

  build-windows:
    needs: bump
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: build-windows

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build WASM engine bundle
        run: pnpm run build:wasm

      - name: Build Tauri app
        run: pnpm exec tauri build
        working-directory: src-tauri

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ needs.bump.outputs.version }}"
          $exeName = "SmoothScroll_${version}_x64-setup.exe"
          $exePath = "target/release/bundle/nsis/$exeName"
          $sigPath = "$exePath.sig"

          if (-not (Test-Path $sigPath)) {
            Write-Error ".sig file not found at $sigPath"
            exit 1
          }

          $signature = Get-Content -Raw -Path $sigPath
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)
          $assetUrl = "https://github.com/quangtruong2003/SmoothScroll/releases/download/${{ needs.bump.outputs.tag }}/$exeName"

          $latest = @{
            version = $version
            notes = "See full changelog at https://github.com/quangtruong2003/SmoothScroll/releases/tag/${{ needs.bump.outputs.tag }}"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $assetUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          New-Item -ItemType Directory -Force -Path "release-feed" | Out-Null
          Set-Content -Path "release-feed/latest.json" -Value $latest
          Get-Content "release-feed/latest.json"

      - name: Upload installers + feed to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
            target/release/bundle/msi/*.msi
            release-feed/latest.json

  build-macos:
    needs: bump
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: build-macos-${{ matrix.target }}

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build WASM engine bundle
        run: pnpm run build:wasm

      - name: Build Tauri app
        run: pnpm exec tauri build --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Upload .dmg to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  cleanup-releases:
    needs: [bump, build-windows, build-macos]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete old releases and tags (keep latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          CURRENT_TAG="${{ needs.bump.outputs.tag }}"
          echo "Keeping release: $CURRENT_TAG"
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | grep -vx "$CURRENT_TAG" \
            | while read -r tag; do
                if [ -n "$tag" ]; then
                  echo "Deleting release + tag: $tag"
                  gh release delete "$tag" --cleanup-tag --yes || echo "  failed to delete $tag"
                fi
              done
