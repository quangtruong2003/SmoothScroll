name: CI Build (feature branches)

# Dry-run release builds for feature branches without bumping version or
# publishing artifacts. Push to ci/** to validate macOS + Windows compile
# before merging to master (which auto-releases).

on:
  push:
    branches:
      - 'ci/**'

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri
          shared-key: ci-windows

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build WASM engine bundle
        run: pnpm run build:wasm

      - name: Build Tauri app (no signing)
        run: pnpm tauri build -- --no-bundle

